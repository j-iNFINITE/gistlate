name: Validate pool

on:
  pull_request:
    branches: [pool]
    paths:
      - 'data/**'
      - 'scripts/validate.mjs'
      - 'schema/**'
  push:
    branches: [pool]
    paths:
      - 'data/**'
      - 'scripts/validate.mjs'
      - 'schema/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate translation artifacts
        run: node scripts/validate.mjs
